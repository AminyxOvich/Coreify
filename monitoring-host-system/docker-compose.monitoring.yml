services:
  consul:
    image: hashicorp/consul:1.16
    container_name: consul-server
    ports:
      - "8500:8500"       # HTTP API
      - "8600:8600/udp"   # DNS
      - "8300:8300/tcp"   # Server RPC
      - "8301:8301"       # LAN Serf TCP
      - "8301:8301/udp"   # LAN Serf UDP
      - "8302:8302"       # WAN Serf TCP
      - "8302:8302/udp"   # WAN Serf UDP
    volumes:
      - consul-data:/consul/data
      - ./config/consul-server.hcl:/consul/config/consul.hcl:ro,Z
    command: ["consul", "agent", "-config-file=/consul/config/consul.hcl"]
    networks:
      - consul-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro,Z
      - ./config/consul-rules.yml:/etc/prometheus/consul-rules.yml:ro,Z
      - /tmp/monitoring-configs:/tmp/monitoring-configs:ro,Z
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - consul-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - consul-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
      - ./config/loki.yml:/etc/loki/local-config.yaml:ro,Z
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - consul-net
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter-monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - consul-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail-monitoring
    ports:
      - "9080:9080"
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml:ro,Z
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - consul-net
    depends_on:
      - loki
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: monitoring-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-monitoring}
      - POSTGRES_USER=${POSTGRES_USER:-monitoring}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - consul-net
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  consul-data:
  postgres-data:

networks:
  consul-net:
    driver: bridge
