global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "consul-rules.yml"

scrape_configs:
  # ─── Consul Service Discovery (all registered services) ────────────
  - job_name: "consul-services"
    consul_sd_configs:
      - server: "consul:8500"
        services: []
    relabel_configs:
      - source_labels: [__meta_consul_service]
        action: drop
        regex: vector
      - source_labels: [__meta_consul_service_port]
        action: drop
        regex: "8300"
      - source_labels: [__meta_consul_service]
        regex: "^(consul|consul-agent)$"
        action: replace
        target_label: __metrics_path__
        replacement: "/v1/agent/metrics"
      - source_labels: [__meta_consul_service]
        regex: "^(consul|consul-agent)$"
        action: replace
        target_label: __param_format
        replacement: "prometheus"
      - source_labels: [__meta_consul_service]
        target_label: job
        replacement: ${1}
      - source_labels: [__meta_consul_node]
        target_label: instance
      - source_labels: [__meta_consul_service_id]
        target_label: service_id
      - source_labels: [__meta_consul_tags]
        target_label: consul_tags
        regex: (.*)
        replacement: ${1}
      - source_labels: [__meta_consul_service_address]
        action: keep
        regex: ".+"

  # ─── Node Exporters via Consul SD ──────────────────────────────────
  - job_name: "node-exporters"
    consul_sd_configs:
      - server: "consul:8500"
        services: ["node-exporter"]
    relabel_configs:
      - source_labels: [__meta_consul_service_address]
        action: keep
        regex: ".+"
      - source_labels: [__meta_consul_service_address]
        target_label: __address__
        replacement: "${1}:9100"
      - source_labels: [__meta_consul_node]
        target_label: instance

  # ─── Prometheus self-scrape ────────────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── File-based SD for targeted infrastructure ─────────────────────
  - job_name: "targeted-infrastructure"
    honor_labels: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: "/metrics"
    scheme: "http"
    file_sd_configs:
      - files:
          - "/etc/prometheus/file_sd/targets.json"
        refresh_interval: 30s
    relabel_configs:
      - target_label: discovery_method
        replacement: "automated_file_sd"
      - source_labels: [server_role]
        target_label: server_role
      - source_labels: [hostname]
        target_label: hostname
