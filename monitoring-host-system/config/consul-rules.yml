groups:
  - name: consul_metrics
    rules:
      - record: consul_server_leader
        expr: max(consul_raft_state_leader) > 0

  - name: Consul Service Alerts
    rules:
      - alert: ConsulLeaderNotAvailable
        expr: absent(consul_server_leader)
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Consul leader is not available"
          description: "No leader found in Consul cluster."

      - alert: ConsulServerDown
        expr: up{job="consul"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Consul server is down"
          description: "Consul server instance is not reachable."

  - name: Prometheus Alerts
    rules:
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus instance is not reachable."

  - name: Grafana Alerts
    rules:
      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Grafana is down"
          description: "Grafana instance is not reachable."

  - name: Loki Alerts
    rules:
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Loki is down"
          description: "Loki instance is not reachable."

  - name: Node Exporter Alerts
    rules:
      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0 or up{job="node-exporters"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node Exporter is down on {{ $labels.instance }}"
          description: "Node Exporter instance {{ $labels.instance }} is not reachable."

      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for more than 10 minutes."

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% for more than 10 minutes."

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Disk space low on {{ $labels.instance }}:{{ $labels.mountpoint }}"
          description: "Disk usage is above 85%."

  - name: Promtail Alerts
    rules:
      - alert: PromtailDown
        expr: up{job="promtail"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Promtail is down"
          description: "Promtail instance is not reachable."