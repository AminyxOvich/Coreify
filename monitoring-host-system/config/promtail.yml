server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # ─── Host system logs ──────────────────────────────────────────────
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: monitoring-host
          __path__: /var/log/*log

  # ─── Docker container logs via SD ──────────────────────────────────
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
        regex: "/?(.+)"
      - source_labels: ["__meta_docker_container_id"]
        target_label: container_id
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_app_component"]
        target_label: component

  # ─── Docker container logs via file path ───────────────────────────
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: containers
          host: monitoring-host
          __path__: /var/lib/docker/containers/*/*.log
    pipeline_stages:
      - json:
          expressions:
            stream: stream
            attrs: attrs
            tag: attrs.tag
      - labels:
          stream:
          tag:
