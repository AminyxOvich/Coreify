server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /promtail/data/positions.yaml

clients:
  - url: http://${MONITORING_HOST}:3100/loki/api/v1/push
    tenant_id: ""
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # ─── Host system logs ──────────────────────────────────────────────
  - job_name: host_system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system_logs
          host: ${CONSUL_NODE_NAME}
          __path__: /mnt/host/var/log/*.log
    pipeline_stages:
      - match:
          selector: '{job="system_logs"}'
          stages:
            - regex:
                expression: "(?P<level>(ERROR|WARN|INFO|DEBUG))"
            - labels:
                level:

  # ─── Docker container logs via SD ──────────────────────────────────
  - job_name: docker_container_logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: logstream
      - source_labels: ["__meta_docker_container_label_logging_jobname"]
        target_label: job
      - target_label: host
        replacement: ${CONSUL_NODE_NAME}