server:
  http_listen_port: 9080
  grpc_listen_port: 0

clients:
  - url: http://${MONITORING_HOST}:3100/loki/api/v1/push

scrape_configs:
  - job_name: host_system_logs
    static_configs:
      - targets:
          - localhost
      - labels:
          job: system_logs
          host: adel
          __path__: /mnt/host/var/log/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
      - labels:
          level:
      - output:
          source: msg

  - job_name: docker_container_logs
    docker_sd_configs:
      - host: unix:///run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container' # Only one target_label for this rule
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream' # Another rule, with its own single target_label
        # target_label: service # REMOVE OR COMMENT OUT THIS DUPLICATE LINE
      - source_labels: ['__meta_docker_container_label_logging_jobname']
        target_label: 'job'